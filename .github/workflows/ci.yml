name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  quality:
    runs-on: ubuntu-latest
    env:
      DIRECT_URL: postgresql://ci:ci@localhost:5432/ci
      NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ci_anon_key
      PAYSTACK_SECRET_KEY: sk_test_ci_placeholder
      NEXT_PUBLIC_SITE_URL: https://example.com
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npm run lint:ci

      - run: npm test -- --ci

      - name: Dependency audit (advisory)
        run: npm audit --audit-level=high
        continue-on-error: true

      - run: npm run build
